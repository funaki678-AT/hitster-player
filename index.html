<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Hitster Player</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hitster" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #191414;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ── Language toggle ── */
    .lang-bar {
      position: fixed;
      top: 12px;
      right: 16px;
      display: flex;
      gap: 4px;
      z-index: 100;
    }
    .lang-pill {
      background: #333;
      color: #b3b3b3;
      border: none;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s, color 0.2s;
    }
    .lang-pill.active {
      background: #1DB954;
      color: #fff;
    }

    .card {
      background: #282828;
      border-radius: 16px;
      padding: 32px 28px;
      width: 340px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    .logo {
      font-size: 13px;
      color: #1DB954;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 24px;
      font-weight: 700;
    }

    /* ── Scanner ── */
    .scanner-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      margin-bottom: 16px;
    }
    #camera-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .scan-frame {
      width: 65%;
      aspect-ratio: 1;
      border: 3px solid #1DB954;
      border-radius: 12px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
    }
    .scan-hint {
      font-size: 13px;
      color: #b3b3b3;
      margin-bottom: 16px;
    }

    /* ── Album Art ── */
    .album-art {
      width: 200px;
      height: 200px;
      border-radius: 8px;
      background: #404040;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      overflow: hidden;
    }
    .album-art img { width: 100%; height: 100%; object-fit: cover; }

    .track-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .artist-name {
      font-size: 14px;
      color: #b3b3b3;
      margin-bottom: 4px;
    }
    .year-badge {
      display: inline-block;
      background: #1DB954;
      color: white;
      font-weight: 700;
      font-size: 13px;
      padding: 3px 12px;
      border-radius: 20px;
      margin-top: 8px;
    }

    /* ── Progress ── */
    .progress-wrap {
      margin: 24px 0 12px;
      background: #404040;
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #1DB954;
      width: 0%;
      transition: width 0.5s linear;
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #b3b3b3;
      margin-bottom: 20px;
    }

    /* ── Buttons ── */
    .controls {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
    }
    .btn {
      border: none;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }
    .btn:hover  { transform: scale(1.08); }
    .btn:active { transform: scale(0.95); }
    .btn-play {
      background: #1DB954;
      width: 60px; height: 60px;
      font-size: 24px;
    }
    .btn-secondary {
      background: #404040;
      width: 44px; height: 44px;
      font-size: 18px;
    }
    .btn-scan-again {
      margin-top: 20px;
      background: #404040;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .btn-scan-again:hover { background: #505050; }

    .btn-login {
      background: #1DB954;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
    }
    .btn-login:hover { background: #1ed760; transform: scale(1.04); }

    .status {
      margin-top: 16px;
      font-size: 13px;
      color: #b3b3b3;
      min-height: 20px;
    }

    .login-section h2 { font-size: 22px; margin-bottom: 10px; }
    .login-section p  { color: #b3b3b3; font-size: 14px; margin-bottom: 28px; line-height: 1.5; }

    .error-box {
      background: #3d1515;
      border: 1px solid #ff4444;
      border-radius: 8px;
      padding: 16px;
      color: #ff8888;
      font-size: 13px;
      line-height: 1.5;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Language toggle -->
<div class="lang-bar">
  <button class="lang-pill active" id="pill-en" onclick="setLang('en')">EN</button>
  <button class="lang-pill"        id="pill-de" onclick="setLang('de')">DE</button>
</div>

<div class="card">
  <div class="logo">🎵 Shitster</div>

  <!-- Login -->
  <div id="view-login" class="login-section hidden">
    <h2 data-i18n="login_title"></h2>
    <p data-i18n-html="login_sub"></p>
    <button class="btn-login" onclick="startLogin()" data-i18n="login_btn"></button>
  </div>

  <!-- Loading -->
  <div id="view-loading" class="hidden">
    <p style="color:#b3b3b3; margin: 40px 0;">⏳ <span id="loading-msg"></span></p>
  </div>

  <!-- Scanner -->
  <div id="view-scanner" class="hidden">
    <div class="scanner-wrap">
      <video id="camera-video" autoplay playsinline muted></video>
      <canvas id="scan-canvas" style="display:none"></canvas>
      <div class="scan-overlay"><div class="scan-frame"></div></div>
    </div>
    <p class="scan-hint" data-i18n="scan_hint"></p>
  </div>

  <!-- Player -->
  <div id="view-player" class="hidden">
    <div class="album-art" id="album-art">🎵</div>
    <div class="track-name"  id="track-name">–</div>
    <div class="artist-name" id="artist-name">–</div>
    <div id="year-badge" class="year-badge hidden">–</div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="time-row">
      <span id="time-current">0:00</span>
      <span id="time-total">0:00</span>
    </div>
    <div class="controls">
      <button class="btn btn-secondary" onclick="seek(-10)">⏪</button>
      <button class="btn btn-play" id="btn-play" onclick="togglePlay()">▶</button>
      <button class="btn btn-secondary" onclick="seek(10)">⏩</button>
    </div>
    <button class="btn-scan-again" onclick="startScanner()" data-i18n="scan_next"></button>
    <div class="status" id="status"></div>
  </div>

  <!-- Error -->
  <div id="view-error" class="error-box hidden">
    <span id="error-msg"></span>
    <br><br>
    <button class="btn-login" onclick="location.reload()" data-i18n="reload_btn"></button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="https://sdk.scdn.co/spotify-player.js"></script>
<script>
// ── i18n ──────────────────────────────────────────────────────────────────────
const T = {
  en: {
    login_title: "Sign in with Spotify",
    login_sub:   "You need a <strong>Spotify Premium</strong> account to play songs.",
    login_btn:   "Sign in with Spotify",
    scan_hint:   "Point the camera at a Shitster QR code",
    scan_next:   "📷 Scan next card",
    reload_btn:  "Reload",
    loading_connect: "Connecting…",
    loading_spotify: "Connecting to Spotify…",
    loading_song:    "Loading song…",
  },
  de: {
    login_title: "Mit Spotify anmelden",
    login_sub:   "Du brauchst einen <strong>Spotify Premium</strong> Account um Lieder abspielen zu können.",
    login_btn:   "Mit Spotify anmelden",
    scan_hint:   "Halte die Kamera auf einen Shitster QR-Code",
    scan_next:   "📷 Nächste Karte scannen",
    reload_btn:  "Neu laden",
    loading_connect: "Verbinde…",
    loading_spotify: "Verbinde mit Spotify…",
    loading_song:    "Lade Song…",
  },
};

let lang = localStorage.getItem("lang") || "en";

function t(key) { return T[lang][key] || T.en[key] || key; }

function setLang(l) {
  lang = l;
  localStorage.setItem("lang", l);
  applyLang();
}

function applyLang() {
  document.getElementById("pill-en").classList.toggle("active", lang === "en");
  document.getElementById("pill-de").classList.toggle("active", lang === "de");
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el => {
    el.innerHTML = t(el.dataset.i18nHtml);
  });
}

// ── Configuration ─────────────────────────────────────────────────────────────
const CLIENT_ID    = "5839ffa0907243398d394ddb8b1f6acd";
const REDIRECT_URI = "https://funaki678-at.github.io/hitster-player/";
const PLAYER_BASE  = "https://funaki678-at.github.io/hitster-player/";
const SCOPES = [
  "streaming",
  "user-read-email",
  "user-read-private",
  "user-modify-playback-state",
].join(" ");

// ── Helpers ───────────────────────────────────────────────────────────────────
function show(id) {
  ["view-login","view-loading","view-scanner","view-player","view-error"]
    .forEach(v => document.getElementById(v).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}
function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
}
function setLoading(key) {
  document.getElementById("loading-msg").textContent = t(key);
  show("view-loading");
}

// ── PKCE ──────────────────────────────────────────────────────────────────────
function base64url(buf) {
  return btoa(String.fromCharCode(...buf))
    .replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
}
async function pkce() {
  const verifier  = base64url(crypto.getRandomValues(new Uint8Array(32)));
  const challenge = base64url(new Uint8Array(
    await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier))
  ));
  return { verifier, challenge };
}
async function startLogin() {
  const { verifier, challenge } = await pkce();
  sessionStorage.setItem("pkce_verifier", verifier);
  const params = new URLSearchParams({
    client_id: CLIENT_ID, response_type: "code",
    redirect_uri: REDIRECT_URI, scope: SCOPES,
    code_challenge_method: "S256", code_challenge: challenge,
  });
  window.location = "https://accounts.spotify.com/authorize?" + params;
}
async function exchangeCode(code) {
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      client_id: CLIENT_ID, grant_type: "authorization_code",
      code, redirect_uri: REDIRECT_URI,
      code_verifier: sessionStorage.getItem("pkce_verifier"),
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error_description || data.error);
  return data;
}
async function refreshToken(refresh) {
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({
      client_id: CLIENT_ID, grant_type: "refresh_token", refresh_token: refresh,
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error_description || data.error);
  return data;
}
function saveTokens(data) {
  localStorage.setItem("access_token",  data.access_token);
  localStorage.setItem("refresh_token", data.refresh_token || localStorage.getItem("refresh_token"));
  localStorage.setItem("token_expiry",  Date.now() + data.expires_in * 1000);
}
async function getValidToken() {
  const expiry = parseInt(localStorage.getItem("token_expiry") || "0");
  if (Date.now() < expiry - 60000) return localStorage.getItem("access_token");
  const refresh = localStorage.getItem("refresh_token");
  if (!refresh) return null;
  const data = await refreshToken(refresh);
  saveTokens(data);
  return data.access_token;
}

// ── Spotify SDK ───────────────────────────────────────────────────────────────
let player = null, deviceId = null, isPlaying = false;
let progressInterval = null, currentPosition = 0, currentDuration = 1;
let sdkReady = false, sdkResolve = null;

window.onSpotifyWebPlaybackSDKReady = () => {
  sdkReady = true;
  if (sdkResolve) sdkResolve();
};
function waitForSDK() {
  return sdkReady ? Promise.resolve() : new Promise(r => { sdkResolve = r; });
}

async function initPlayer(token) {
  if (player) return;
  await waitForSDK();
  return new Promise((resolve, reject) => {
    player = new Spotify.Player({
      name: "Shitster Player",
      getOAuthToken: cb => getValidToken().then(cb),
      volume: 0.8,
    });
    player.addListener("ready", ({ device_id }) => { deviceId = device_id; resolve(); });
    player.addListener("player_state_changed", state => { if (state) updateUI(state); });
    player.addListener("initialization_error", e => reject(new Error(e.message)));
    player.addListener("authentication_error", e => reject(new Error("Please sign in again.")));
    player.addListener("account_error",        () => reject(new Error("Spotify Premium required.")));
    player.connect();
  });
}

function updateUI(state) {
  const track = state.track_window?.current_track;
  if (!track) return;
  document.getElementById("track-name").textContent  = track.name;
  document.getElementById("artist-name").textContent = track.artists.map(a => a.name).join(", ");
  const art = document.getElementById("album-art");
  const img = track.album?.images?.[0]?.url;
  art.innerHTML = img ? `<img src="${img}" alt="Cover">` : "🎵";
  isPlaying = !state.paused;
  document.getElementById("btn-play").textContent = isPlaying ? "⏸" : "▶";
  currentDuration = state.duration;
  currentPosition = state.position;
  updateProgress();
  clearInterval(progressInterval);
  if (isPlaying) progressInterval = setInterval(() => { currentPosition += 500; updateProgress(); }, 500);
}

function updateProgress() {
  document.getElementById("progress-bar").style.width = Math.min(100, currentPosition/currentDuration*100) + "%";
  document.getElementById("time-current").textContent = formatTime(currentPosition);
  document.getElementById("time-total").textContent   = formatTime(currentDuration);
}

async function playTrack(token, trackId) {
  await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
    method: "PUT",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ uris: [`spotify:track:${trackId}`], position_ms: 0 }),
  });
}

async function fetchTrackInfo(token, trackId) {
  const res  = await fetch(`https://api.spotify.com/v1/tracks/${trackId}`,
    { headers: { Authorization: `Bearer ${token}` } });
  const data = await res.json();
  const year = data.album?.release_date?.slice(0,4);
  const badge = document.getElementById("year-badge");
  if (year) { badge.textContent = year; badge.classList.remove("hidden"); }
  else badge.classList.add("hidden");
}

async function togglePlay() { if (player) await player.togglePlay(); }
async function seek(s) {
  if (!player) return;
  const state = await player.getCurrentState();
  if (state) await player.seek(Math.max(0, state.position + s * 1000));
}

// ── QR Scanner ────────────────────────────────────────────────────────────────
let scanInterval = null;
let cameraStream = null;

async function startScanner() {
  show("view-scanner");
  document.getElementById("year-badge").classList.add("hidden");

  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
  }

  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });
    const video = document.getElementById("camera-video");
    video.srcObject = cameraStream;
    await video.play();
    scanInterval = setInterval(scanFrame, 200);
  } catch (e) {
    showError("Camera could not be started: " + e.message);
  }
}

function stopScanner() {
  clearInterval(scanInterval);
  scanInterval = null;
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
}

function scanFrame() {
  const video  = document.getElementById("camera-video");
  const canvas = document.getElementById("scan-canvas");
  if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = jsQR(imageData.data, imageData.width, imageData.height);

  if (code) {
    const url = code.data;
    const match = url.match(/[?&]track=([a-zA-Z0-9]+)/);
    if (match) {
      stopScanner();
      handleTrack(match[1]);
    }
  }
}

// ── Play track ────────────────────────────────────────────────────────────────
async function handleTrack(trackId) {
  try {
    setLoading("loading_song");
    const token = await getValidToken();
    await playTrack(token, trackId);
    await fetchTrackInfo(token, trackId);
    show("view-player");
  } catch (e) {
    showError(e.message);
  }
}

// ── Error ─────────────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById("error-msg").textContent = msg;
  show("view-error");
  applyLang(); // re-apply to reload button
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function main() {
  applyLang();

  const urlParams = new URLSearchParams(window.location.search);
  const code      = urlParams.get("code");

  try {
    if (code) {
      setLoading("loading_connect");
      const data = await exchangeCode(code);
      saveTokens(data);
      sessionStorage.removeItem("pkce_verifier");
      window.history.replaceState({}, "", REDIRECT_URI);
    }

    const token = await getValidToken();
    if (!token) { show("view-login"); applyLang(); return; }

    setLoading("loading_spotify");
    await initPlayer(token);

    await startScanner();

  } catch (e) {
    showError(e.message);
  }
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(console.error);
}

main();
</script>
</body>
</html>
